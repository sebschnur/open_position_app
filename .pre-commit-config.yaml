# De-facto-Qualitaetstor (es gibt keine CI/CD - pre-commit ist das Gate).
# Setup:
#   pip install -r requirements-dev.txt
#   pre-commit install
# Einmal ueber alles laufen lassen:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff            # Linter (mit Autofix)
        args: ["--fix"]
      - id: ruff-format     # Formatter (Black-kompatibel, 88)

  # mypy ueber den offiziellen mirrors-mypy-Hook: pre-commit baut dafuer eine
  # eigene, isolierte Umgebung (portabel, unabhaengig von venv-Pfaden/-Aktivierung).
  # Konfiguration kommt aus pyproject.toml ([tool.mypy]); geprueft wird nur src/.
  # rev an das Pin in requirements-dev.txt angeglichen (mypy 1.15.0).
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: ["--config-file", "pyproject.toml", "src"]
        pass_filenames: false
        files: ^src/
